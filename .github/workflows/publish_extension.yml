name: Publish VS Code Extension

on:
  push:
    tags:
      - 'v*.*.*'       # Release tags     e.g. v1.2.3
      - 'v*.*.*-pre'   # Pre-release tags e.g. v1.2.3-pre

# This workflow is tag-driven. Tag formats:
#   v1.2.3     -> stable release
#   v1.2.3-pre -> pre-release
# The tagged commit must be the HEAD of main (enforced below).

jobs:
  # ── Job 1: Build on Windows (required to produce ddk_server.exe) ────────────
  build:
    name: Build & Package
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      is_pre:      ${{ steps.flags.outputs.is_pre }}
      tag_version: ${{ steps.flags.outputs.tag_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is HEAD of main
        shell: bash
        run: |
          git fetch origin main --depth=1
          MAIN_SHA=$(git rev-parse origin/main)
          if [ "$GITHUB_SHA" != "$MAIN_SHA" ]; then
            echo "Tag commit ($GITHUB_SHA) is not HEAD of main ($MAIN_SHA)." >&2
            exit 1
          fi

      - name: Derive release flags
        id: flags
        shell: bash
        run: |
          REF_NAME="${GITHUB_REF#refs/tags/}"   # e.g. v1.2.3 or v1.2.3-pre
          if [[ "$REF_NAME" == *-pre ]]; then
            IS_PRE=true
            VERSION_PART="${REF_NAME%-pre}"     # strip -pre suffix
          else
            IS_PRE=false
            VERSION_PART="$REF_NAME"
          fi
          VERSION_PART="${VERSION_PART#v}"      # strip leading v
          echo "is_pre=$IS_PRE"       >> $GITHUB_OUTPUT
          echo "tag_version=$VERSION_PART" >> $GITHUB_OUTPUT
          echo "Channel: $([ $IS_PRE = true ] && echo pre || echo stable)"
          echo "Version: $VERSION_PART  Pre-release: $IS_PRE"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build server (release)
        run: cargo build --release
        working-directory: server

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: vscode_extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vscode_extension

      - name: Verify package.json version matches tag version
        shell: bash
        working-directory: vscode_extension
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.flags.outputs.tag_version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag version ($TAG_VERSION)." >&2
            exit 1
          fi

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        shell: bash
        working-directory: vscode_extension
        run: |
          if [ "${{ steps.flags.outputs.is_pre }}" = "true" ]; then
            vsce package --pre-release --out delphi-devkit.vsix
          else
            vsce package --out delphi-devkit.vsix
          fi

      - name: Verify binary is inside VSIX
        shell: pwsh
        working-directory: vscode_extension
        run: |
          $entries = 7z l delphi-devkit.vsix
          if ($entries | Select-String -Quiet 'ddk-server.exe') {
            Write-Host "✓ ddk-server.exe found in VSIX"
          } else {
            Write-Error "✘ ddk-server.exe NOT found in VSIX — aborting"
            exit 1
          }

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: delphi-devkit-vsix
          path: vscode_extension/delphi-devkit.vsix
          retention-days: 7

  # ── Job 2: Publish & Release (runs on ubuntu-latest) ────────────────────────
  publish:
    name: Publish & Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: delphi-devkit-vsix

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish extension to Marketplace
        shell: bash
        run: |
          if [ "${{ needs.build.outputs.is_pre }}" = "true" ]; then
            vsce publish --pre-release --packagePath delphi-devkit.vsix
          else
            vsce publish --packagePath delphi-devkit.vsix
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create / Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ needs.build.outputs.is_pre == 'true' }}
          generateReleaseNotes: true
          artifacts: delphi-devkit.vsix
